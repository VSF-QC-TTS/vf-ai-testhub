# ============================================================
# VF AI TestHub - Local Docker Compose
# Backend (Spring Boot) + Runner (Node.js) + DB + Redis + mock target
# All ports bound to 127.0.0.1 only
# ============================================================

services:
  # ---------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vat_dev}
      POSTGRES_USER: ${POSTGRES_USER:-vat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------
  # Redis
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------
  # Backend API (Spring Boot)
  # ---------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-vat_dev}
      DB_USERNAME: ${POSTGRES_USER:-vat}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vat}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      RUNNER_TOKEN: ${RUNNER_TOKEN:-local-runner-token}
    volumes:
      - app-logs:/app/logs
      - app-exports:/app/exports

  # ---------------------------------------------------------
  # Runner Worker (Node.js)
  # ---------------------------------------------------------
  runner:
    build:
      context: ./apps/runner
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
      mock-target:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_STREAM_KEY: run:jobs
      REDIS_CONSUMER_GROUP: vf-ai-testhub-runner
      REDIS_CONSUMER_NAME: runner-compose-1
      BACKEND_BASE_URL: http://api:8080
      RUNNER_TOKEN: ${RUNNER_TOKEN:-local-runner-token}
      RUNNER_MAX_CONCURRENCY: ${RUNNER_MAX_CONCURRENCY:-3}
      RUNNER_POLL_BLOCK_MS: ${RUNNER_POLL_BLOCK_MS:-5000}
      RUNNER_RESULT_BATCH_SIZE: ${RUNNER_RESULT_BATCH_SIZE:-50}
      RUNNER_RESULT_FLUSH_INTERVAL_MS: ${RUNNER_RESULT_FLUSH_INTERVAL_MS:-2000}
      RUNNER_ARTIFACT_DIR: /app/artifacts
    volumes:
      - runner-artifacts:/app/artifacts

  # ---------------------------------------------------------
  # Mock target for runner smoke tests
  # ---------------------------------------------------------
  mock-target:
    build:
      context: ./apps/mock-target
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      PORT: 8090

volumes:
  pgdata:
  app-exports:
  app-logs:
  runner-artifacts:
